<!DOCTYPE html>
<html>
<head>
    <title>客户API测试</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 8px 16px; margin: 5px; cursor: pointer; }
        pre { background: #f5f5f5; padding: 10px; border-radius: 3px; overflow-x: auto; }
        .error { color: red; }
        .success { color: green; }
        input { padding: 5px; margin: 5px; }
    </style>
</head>
<body>
    <h1>客户列表API诊断工具</h1>
    
    <div class="section">
        <h3>步骤1: 登录获取Token</h3>
        <input type="text" id="username" placeholder="用户名" value="admin">
        <input type="password" id="password" placeholder="密码" value="123456">
        <button onclick="login()">登录</button>
        <div id="loginResult"></div>
    </div>
    
    <div class="section">
        <h3>步骤2: 查看用户信息和权限</h3>
        <button onclick="getUserInfo()">获取用户信息</button>
        <div id="userInfoResult"></div>
    </div>
    
    <div class="section">
        <h3>步骤3: 测试客户列表接口</h3>
        <button onclick="getCustomerList()">获取客户列表</button>
        <div id="customerListResult"></div>
    </div>
    
    <script>
        let token = localStorage.getItem('token') || '';
        const API_BASE = 'http://localhost:8000/api';
        
        if (token) {
            document.getElementById('loginResult').innerHTML = '<p class="success">已有Token: ' + token.substring(0, 20) + '...</p>';
        }
        
        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const resultDiv = document.getElementById('loginResult');
            
            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (data.code === 200) {
                    token = data.data.token;
                    localStorage.setItem('token', token);
                    resultDiv.innerHTML = `
                        <p class="success">✓ 登录成功</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                } else {
                    resultDiv.innerHTML = `<p class="error">✗ 登录失败: ${data.message}</p>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<p class="error">✗ 请求失败: ${error.message}</p>`;
            }
        }
        
        async function getUserInfo() {
            const resultDiv = document.getElementById('userInfoResult');
            
            if (!token) {
                resultDiv.innerHTML = '<p class="error">请先登录</p>';
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/auth/info`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                const data = await response.json();
                
                if (data.code === 200) {
                    const permissions = data.data.permissions || [];
                    const hasCustomerList = permissions.includes('customer:list');
                    
                    resultDiv.innerHTML = `
                        <p class="success">✓ 用户信息获取成功</p>
                        <p><strong>用户名:</strong> ${data.data.user.username}</p>
                        <p><strong>角色:</strong> ${data.data.user.roles.map(r => r.roleName).join(', ')}</p>
                        <p><strong>是否有customer:list权限:</strong> <span class="${hasCustomerList ? 'success' : 'error'}">${hasCustomerList ? '是' : '否'}</span></p>
                        <details>
                            <summary>查看所有权限</summary>
                            <pre>${JSON.stringify(permissions, null, 2)}</pre>
                        </details>
                    `;
                } else {
                    resultDiv.innerHTML = `<p class="error">✗ 获取失败: ${data.message}</p>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<p class="error">✗ 请求失败: ${error.message}</p>`;
            }
        }
        
        async function getCustomerList() {
            const resultDiv = document.getElementById('customerListResult');
            
            if (!token) {
                resultDiv.innerHTML = '<p class="error">请先登录</p>';
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/customer/page?pageNum=1&pageSize=10`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                const data = await response.json();
                
                if (data.code === 200) {
                    const total = data.data.total || 0;
                    const records = data.data.records || data.data.list || [];
                    
                    resultDiv.innerHTML = `
                        <p class="success">✓ 接口调用成功</p>
                        <p><strong>总记录数:</strong> ${total}</p>
                        <p><strong>当前页记录数:</strong> ${records.length}</p>
                        ${records.length === 0 ? '<p class="error">⚠️ 数据库中没有客户数据！</p>' : ''}
                        <details>
                            <summary>查看完整响应</summary>
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                        </details>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <p class="error">✗ 接口调用失败</p>
                        <p>错误码: ${data.code}</p>
                        <p>错误信息: ${data.message}</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `<p class="error">✗ 请求失败: ${error.message}</p>`;
            }
        }
    </script>
</body>
</html>
