spring:
  datasource:
    hikari:
      minimum-idle: 10
      maximum-pool-size: 20
      idle-timeout: 30000
      connection-timeout: 30000

jwt:
  expiration: 43200000

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://test.example.com}

logging:
  level:
    root: INFO
    "[com.example.permission]": INFO
    "[com.mybatisflex]": INFO
    "[org.springframework.security]": INFO

management:
  endpoint:
    health:
      show-details: when-authorized
