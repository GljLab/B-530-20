spring:
  datasource:
    hikari:
      minimum-idle: 20
      maximum-pool-size: 50
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-timeout: 30000
      leak-detection-threshold: 20000

jwt:
  expiration: 7200000

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://example.com}

logging:
  level:
    root: WARN
    "[com.example.permission]": WARN
    "[com.mybatisflex]": ERROR
    "[org.springframework.security]": WARN

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
