name: permission-530

services:
  # MySQL 数据库
  db:
    image: mysql:8.0
    container_name: label-530-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:permission_system}
      TZ: ${TZ:Asia/Shanghai}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./db/migration_20240615_add_related_order_id.sql:/docker-entrypoint-initdb.d/02-migration_20240615.sql:ro
      - ./db/migration_20260615_enhancements.sql:/docker-entrypoint-initdb.d/03-migration_20260615.sql:ro
      - ./db/migration_20260615_customer.sql:/docker-entrypoint-initdb.d/04-migration_20260615_customer.sql:ro
      - ./db/migration_20260615_customer_enhance.sql:/docker-entrypoint-initdb.d/05-migration_20260615_customer_enhance.sql:ro
      - ./db/migration_20260616_booking_system.sql:/docker-entrypoint-initdb.d/06-migration_20260616_booking_system.sql:ro
      - ./db/migration_20260616_booking_enhance.sql:/docker-entrypoint-initdb.d/07-migration_20260616_booking_enhance.sql:ro
      
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - permission-network

  # Spring Boot 后端
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: permission-system-backend:${APP_VERSION:latest}
    container_name: label-530-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:dev}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:jdbc:mysql://db:3306/permission_system?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:root}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:root}
      JWT_SECRET: ${JWT_SECRET:ChangeMe_GenerateA32+CharSecureRandomString!}
      JWT_EXPIRATION: ${JWT_EXPIRATION:86400000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
      LOG_FILE_PATH: ${LOG_FILE_PATH:/app/logs/app.log}
      TZ: ${TZ:Asia/Shanghai}
    ports:
      - "8000:8000"
    volumes:
      - backend_uploads:/app/uploads
      - ./logs/backend:/app/logs
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8000/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - permission-network

  # Vue 前端
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: label-530-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - permission-network

volumes:
  mysql_data:
    driver: local
  backend_uploads:
    driver: local

networks:
  permission-network:
    driver: bridge
